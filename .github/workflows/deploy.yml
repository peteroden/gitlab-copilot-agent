name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
      image_tag:
        description: "Container image tag to deploy"
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  packages: write

env:
  TERRAFORM_VERSION: "1.9.x"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true"
    steps:
      - uses: actions/checkout@v4

      # Step 1: Build and push image to GHCR (no infra dependency)
      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "✓ Pushed $IMAGE"

      # Step 2: Provision infrastructure (single terraform apply)
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Enable TF state storage public access
        run: |
          az storage account update \
            -n ${{ vars.TF_STATE_STORAGE_ACCOUNT }} \
            -g ${{ vars.TF_STATE_RESOURCE_GROUP }} \
            --public-network-access Enabled \
            -o none
          echo "Waiting for public access to propagate..."
          for i in $(seq 1 24); do
            if az storage container list \
                 --account-name ${{ vars.TF_STATE_STORAGE_ACCOUNT }} \
                 --auth-mode login --only-show-errors -o none 2>/dev/null; then
              echo "Storage accessible after $((i * 5))s"
              break
            fi
            if [ "$i" -eq 24 ]; then
              echo "::error::Timeout waiting for storage access (120s)"
              exit 1
            fi
            sleep 5
          done

      - name: Terraform init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ inputs.environment }}.terraform.tfstate" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="use_oidc=true"

      - name: Substitute tfvars placeholders
        working-directory: infra
        run: |
          sed -i \
            -e 's|__AZURE_SUBSCRIPTION_ID__|${{ vars.AZURE_SUBSCRIPTION_ID }}|g' \
            -e 's|__JIRA_EMAIL__|${{ vars.JIRA_EMAIL }}|g' \
            "${{ inputs.environment }}.tfvars"

      - name: Terraform apply
        working-directory: infra
        env:
          TF_VAR_kv_bootstrap_secrets: '{"gitlab-token":"${{ secrets.GITLAB_TOKEN }}","github-token":"${{ secrets.GH_PAT_FOR_COPILOT }}","jira-api-token":"${{ secrets.JIRA_API_TOKEN }}"}'
        run: |
          terraform apply -auto-approve \
            -var-file="${{ inputs.environment }}.tfvars" \
            -var="image_tag=${{ inputs.image_tag }}"

      - name: Disable TF state storage public access
        if: always()
        run: |
          az storage account update \
            -n ${{ vars.TF_STATE_STORAGE_ACCOUNT }} \
            -g ${{ vars.TF_STATE_RESOURCE_GROUP }} \
            --public-network-access Disabled \
            -o none

name: CD Staging

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      image_tag: main-${{ github.sha }}
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      packages: write

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
    steps:
      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for controller revision health
        run: |
          for i in $(seq 1 30); do
            revision=$(az containerapp show \
              -g rg-copilot-staging \
              -n ca-controller \
              --query 'properties.latestRevisionName' \
              -o tsv)
            state=$(az containerapp revision list \
              -g rg-copilot-staging \
              -n ca-controller \
              --query "[?name=='${revision}'].properties | [0].{revisionName: '${revision}', provisioningState: provisioningState, healthState: healthState, replicas: replicas, runningState: runningState}" \
              -o json)
            echo "$state"
            if [[ -n "$revision" \
               && $(echo "$state" | jq -r '.revisionName // empty') == "$revision" \
               && $(echo "$state" | jq -r '.provisioningState // empty') == "Provisioned" \
              && $(echo "$state" | jq -r '.healthState // empty') == "Healthy" ]]; then
              echo "✓ Staging controller revision healthy"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Staging controller revision did not become healthy after 5 minutes"
          exit 1

replicaCount: 1
image: { repository: ghcr.io/peteroden/gitlab-copilot-agent, tag: latest, pullPolicy: IfNotPresent }
controller:
  port: 8000
  logLevel: info
  taskExecutor: kubernetes
  dispatchBackend: azure_storage
  copilotModel: gpt-4
  copilotProviderType: ""
  copilotProviderBaseUrl: ""
  copilotProviderApiKey: ""
  resources:
    limits: { cpu: 500m, memory: 512Mi }
    requests: { cpu: 100m, memory: 256Mi }
azurite:
  enabled: true
  image: { repository: mcr.microsoft.com/azure-storage/azurite, tag: latest }
  resources:
    limits: { cpu: 250m, memory: 256Mi }
    requests: { cpu: 50m, memory: 128Mi }
  persistence:
    enabled: true
    size: 1Gi
keda:
  enabled: true
  pollingInterval: 10
  maxReplicaCount: 10
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  ttlSecondsAfterFinished: 300
  queueName: task-queue
telemetry:
  # Set to enable OpenTelemetry export (e.g. "http://otel-collector:4317")
  otlpEndpoint: ""
  # Optional deployment environment label (e.g. "production", "staging")
  environment: ""
  collector:
    image: { repository: otel/opentelemetry-collector-contrib, tag: "0.115.0" }
    resources:
      limits: { cpu: 200m, memory: 256Mi }
      requests: { cpu: 50m, memory: 128Mi }
jobRunner: { image: "", cpuLimit: "1", memoryLimit: 1Gi, timeout: 600 }
service: { type: ClusterIP }
serviceAccount: { create: true, name: "" }
gitlab: { url: "", token: "", webhookSecret: "" }  # webhookSecret is optional for polling-only mode
github: { token: "" }
jira:
  url: ""
  email: ""
  apiToken: ""
  projectMap: ""
  triggerStatus: "AI Ready"
  inProgressStatus: "In Progress"
  inReviewStatus: "In Review"
  pollInterval: 30
extraEnv: {}
  # Tunable env vars via extraEnv:
  #   QUEUE_VISIBILITY_BUFFER: "60"  # seconds added to job timeout for queue message visibility (default: 60)
clusterDomain: cluster.local
hostAliases: []
networkPolicies:
  # Set to true if your CNI supports NetworkPolicy (Calico, Cilium, Weave, etc.)
  # Note: Kind and Minikube require CNI installation; GKE, AKS, EKS support varies by config.
  enabled: false
  controller:
    ingress:
      # Empty = allow all. Add namespaceSelector/podSelector to restrict ingress.
      # Example: [{"namespaceSelector": {"matchLabels": {"name": "ingress-ns"}}}]
      allowFrom: []

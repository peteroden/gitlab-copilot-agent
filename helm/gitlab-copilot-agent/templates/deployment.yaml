apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  labels: {{- include "app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
      annotations:
        deploy-timestamp: {{ now | date "20060102150405" | quote }}
    spec:
      serviceAccountName: {{ include "app.serviceAccountName" . }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.azurite.enabled }}
      initContainers:
        - name: init-azurite
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: [".venv/bin/python", "-c"]
          args:
            - |
              import os, sys, time
              from azure.storage.queue import QueueServiceClient
              from azure.storage.blob import BlobServiceClient
              conn = os.environ["AZURE_STORAGE_CONNECTION_STRING"]
              queue_ok = False
              for attempt in range(30):
                  try:
                      QueueServiceClient.from_connection_string(conn).create_queue("task-queue")
                      print("Queue created"); queue_ok = True; break
                  except Exception as e:
                      if "QueueAlreadyExists" in str(e) or "QUEUE_ALREADY_EXISTS" in str(e):
                          print("Queue exists"); queue_ok = True; break
                      print(f"Waiting for Azurite... ({e})")
                      time.sleep(2)
              if not queue_ok:
                  print("FATAL: queue creation failed after 30 retries"); sys.exit(1)
              container_ok = False
              for attempt in range(10):
                  try:
                      BlobServiceClient.from_connection_string(conn).create_container("task-data")
                      print("Container created"); container_ok = True; break
                  except Exception as e:
                      if "ContainerAlreadyExists" in str(e) or "CONTAINER_ALREADY_EXISTS" in str(e):
                          print("Container exists"); container_ok = True; break
                      print(f"Retry... ({e})")
                      time.sleep(2)
              if not container_ok:
                  print("FATAL: blob container creation failed after 10 retries"); sys.exit(1)
          envFrom:
            - secretRef: { name: {{ include "app.fullname" . }} }
      {{- end }}
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: {{ .Values.controller.port }} }]
          envFrom:
            - configMapRef: { name: {{ include "app.fullname" . }} }
            - secretRef: { name: {{ include "app.fullname" . }} }
          {{- if .Values.telemetry.otlpEndpoint }}
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(POD_NAMESPACE),k8s.node.name=$(NODE_NAME)"
          {{- end }}
          resources: {{- toYaml .Values.controller.resources | nindent 12 }}
          livenessProbe: { httpGet: { path: /health, port: {{ .Values.controller.port }} }, initialDelaySeconds: 10 }
          readinessProbe: { httpGet: { path: /health, port: {{ .Values.controller.port }} } }

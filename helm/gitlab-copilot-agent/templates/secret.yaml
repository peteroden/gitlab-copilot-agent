apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" . }}
  labels: {{- include "app.labels" . | nindent 4 }}
type: Opaque
stringData:
  GITLAB_TOKEN: {{ required "gitlab.token is required" .Values.gitlab.token | quote }}
  {{- with .Values.gitlab.webhookSecret }}
  GITLAB_WEBHOOK_SECRET: {{ . | quote }}
  {{- end }}
  {{- if .Values.azurite.enabled }}
  {{- /* Generate a random Azurite account key on first install; reuse on upgrades */ -}}
  {{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (include "app.fullname" .)) -}}
  {{- $azuriteKey := "" -}}
  {{- if and $existingSecret (hasKey (default dict $existingSecret.data) "AZURITE_ACCOUNT_KEY") -}}
    {{- $azuriteKey = index $existingSecret.data "AZURITE_ACCOUNT_KEY" | b64dec -}}
  {{- else -}}
    {{- $azuriteKey = randBytes 32 | b64enc -}}
  {{- end }}
  AZURITE_ACCOUNT_KEY: {{ $azuriteKey | quote }}
  AZURITE_ACCOUNTS: {{ printf "devstoreaccount1:%s" $azuriteKey | quote }}
  AZURE_STORAGE_CONNECTION_STRING: {{ printf "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=%s;QueueEndpoint=http://%s-azurite.%s.svc.%s:10001/devstoreaccount1;BlobEndpoint=http://%s-azurite.%s.svc.%s:10000/devstoreaccount1" $azuriteKey (include "app.fullname" .) .Release.Namespace .Values.clusterDomain (include "app.fullname" .) .Release.Namespace .Values.clusterDomain | quote }}
  {{- end }}
  {{- with .Values.github.token }}
  GITHUB_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.controller.copilotProviderApiKey }}
  COPILOT_PROVIDER_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.jira.email }}
  JIRA_EMAIL: {{ . | quote }}
  {{- end }}
  {{- with .Values.jira.apiToken }}
  JIRA_API_TOKEN: {{ . | quote }}
  {{- end }}

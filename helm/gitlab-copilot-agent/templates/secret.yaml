apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" . }}
  labels: {{- include "app.labels" . | nindent 4 }}
type: Opaque
stringData:
  GITLAB_TOKEN: {{ required "gitlab.token is required" .Values.gitlab.token | quote }}
  {{- with .Values.gitlab.webhookSecret }}
  GITLAB_WEBHOOK_SECRET: {{ . | quote }}
  {{- end }}
  {{- if .Values.azurite.enabled }}
  AZURE_STORAGE_CONNECTION_STRING: {{ printf "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;QueueEndpoint=http://%s-azurite:10001/devstoreaccount1;BlobEndpoint=http://%s-azurite:10000/devstoreaccount1" (include "app.fullname" .) (include "app.fullname" .) | quote }}
  {{- end }}
  {{- with .Values.github.token }}
  GITHUB_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.controller.copilotProviderApiKey }}
  COPILOT_PROVIDER_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.jira.email }}
  JIRA_EMAIL: {{ . | quote }}
  {{- end }}
  {{- with .Values.jira.apiToken }}
  JIRA_API_TOKEN: {{ . | quote }}
  {{- end }}

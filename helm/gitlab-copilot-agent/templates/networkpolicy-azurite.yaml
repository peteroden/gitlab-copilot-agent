{{- if and .Values.networkPolicies.enabled .Values.azurite.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "app.fullname" . }}-azurite
  labels: {{- include "app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: azurite
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow connections from controller and job pods in same namespace
    - from:
        - podSelector:
            matchLabels:
              {{- include "app.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: controller
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Chart.Name }}
              app.kubernetes.io/component: job
      ports:
        - { protocol: TCP, port: 10000 }
        - { protocol: TCP, port: 10001 }
  egress:
    # DNS only (Azurite doesn't need external access)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchExpressions:
              - key: k8s-app
                operator: In
                values: [kube-dns, coredns]
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
{{- end }}
